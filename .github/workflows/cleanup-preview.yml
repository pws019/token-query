name: Cleanup Preview Resources

on:
  pull_request:
    types:
      - closed
    branches:
      - main-v2

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: preview-cleanup-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      PREVIEW_BASE_DOMAIN: ${{ vars.PREVIEW_BASE_DOMAIN || 'app.doyouadoreme.online' }}

    steps:
      - name: Resolve PR preview names
        env:
          BRANCH_NAME: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail

          branch_regex='^(bug|feat|fix|chore|hotfix)/((bug|feat|fix|chore|hotfix)-[0-9]+)-[a-z0-9-]+$'
          title_regex='^((bug|feat|fix|chore|hotfix)-[0-9]+):'

          if [[ "$BRANCH_NAME" =~ $branch_regex ]]; then
            preview_id="${BASH_REMATCH[2]}"
          elif [[ "$PR_TITLE" =~ $title_regex ]]; then
            preview_id="${BASH_REMATCH[1]}"
          else
            echo "::error::Unable to resolve preview ID from branch '$BRANCH_NAME' or PR title '$PR_TITLE'."
            exit 1
          fi

          {
            echo "PREVIEW_ID=$preview_id"
            echo "WORKER_NAME=token-query-pr-$preview_id"
            echo "PREVIEW_DOMAIN=$preview_id.$PREVIEW_BASE_DOMAIN"
            echo "STACK_NAME=token-query-preview-api-$preview_id"
            echo "FUNCTION_NAME=token-query-pr-$preview_id"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check preview cleanup settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          set -euo pipefail

          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$AWS_REGION"
          test -n "$AWS_DEPLOY_ROLE_ARN"
          test -n "$PREVIEW_ID"
          test -n "$WORKER_NAME"
          test -n "$PREVIEW_DOMAIN"
          test -n "$STACK_NAME"
          test -n "$FUNCTION_NAME"

      - name: Delete app preview Worker
        id: worker_cleanup
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          printf "yes\n" | pnpm dlx wrangler@4 delete --name "$WORKER_NAME"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Build server asset for CDK synth
        run: pnpm --filter server build

      - name: Delete backend API preview stack
        id: api_cleanup
        run: |
          set -euo pipefail

          if ! aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Preview stack $STACK_NAME does not exist; skipping AWS cleanup."
            echo "api_cleanup_status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PREVIEW_ID="$PREVIEW_ID" pnpm --filter @token-query/infra-cdk cdk destroy "$STACK_NAME" --force
          echo "api_cleanup_status=deleted" >> "$GITHUB_OUTPUT"

      - name: Comment cleanup result
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          WORKER_CLEANUP_STATUS: ${{ steps.worker_cleanup.outcome }}
          API_CLEANUP_STATUS: ${{ steps.api_cleanup.outputs.api_cleanup_status || steps.api_cleanup.outcome }}
        with:
          script: |
            const marker = "<!-- token-query-preview-cleanup -->";
            const merged = context.payload.pull_request?.merged === true;
            const body = `${marker}
            Preview cleanup finished.

            Preview URL: https://${process.env.PREVIEW_DOMAIN}
            App Worker: \`${process.env.WORKER_NAME}\` (${process.env.WORKER_CLEANUP_STATUS})
            Backend stack: \`${process.env.STACK_NAME}\` (${process.env.API_CLEANUP_STATUS})
            Backend function: \`${process.env.FUNCTION_NAME}\`
            Preview ID: \`${process.env.PREVIEW_ID}\`
            PR result: ${merged ? "merged" : "closed"}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Unable to comment cleanup result: ${error.message}`);
            }
