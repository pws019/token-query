name: Cleanup Go Preview

on:
  pull_request:
    types:
      - closed
    branches:
      - main-v2
    paths:
      - "apps/go-service/**"
      - "infra/codebuild/**"
      - "infra/cdk/**"
      - ".github/workflows/deploy-go-preview.yml"
      - ".github/workflows/cleanup-go-preview.yml"
      - "docs/pr-preview-naming.md"
  workflow_dispatch:
    inputs:
      preview_id:
        description: "Preview ID to clean up, for example feat-001."
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: go-preview-cleanup-${{ github.event.pull_request.number || inputs.preview_id }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}

    steps:
      - name: Resolve preview names
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_NAME: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          INPUT_PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail

          preview_id_regex='^(bug|feat|fix|chore|hotfix)-[0-9]+$'
          branch_regex='^(bug|feat|fix|chore|hotfix)/((bug|feat|fix|chore|hotfix)-[0-9]+)-[a-z0-9-]+$'
          title_regex='^((bug|feat|fix|chore|hotfix)-[0-9]+):'

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            preview_id="$INPUT_PREVIEW_ID"

            if [[ ! "$preview_id" =~ $preview_id_regex ]]; then
              echo "::error::preview_id must match <type>-<number>, for example feat-001."
              exit 1
            fi
          elif [[ "$BRANCH_NAME" =~ $branch_regex ]]; then
            preview_id="${BASH_REMATCH[2]}"
          elif [[ "$PR_TITLE" =~ $title_regex ]]; then
            preview_id="${BASH_REMATCH[1]}"
          else
            echo "::error::Unable to resolve preview ID from branch '$BRANCH_NAME' or PR title '$PR_TITLE'."
            exit 1
          fi

          {
            echo "PREVIEW_ID=$preview_id"
            echo "STACK_NAME=token-query-preview-go-$preview_id"
            echo "SERVICE_NAME=token-query-go-pr-$preview_id"
            echo "GO_SERVICE_ORIGIN=http://go-$preview_id.token-query.internal:8080"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Go preview cleanup settings
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          set -euo pipefail

          test -n "$AWS_REGION"
          test -n "$AWS_DEPLOY_ROLE_ARN"
          test -n "$PREVIEW_ID"
          test -n "$STACK_NAME"
          test -n "$SERVICE_NAME"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Delete Go preview stack
        id: go_cleanup
        run: |
          set -euo pipefail

          if ! aws cloudformation describe-stacks --stack-name "$STACK_NAME" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Preview stack $STACK_NAME does not exist; skipping AWS cleanup."
            echo "go_cleanup_status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CDK_STACK_SCOPE=go PREVIEW_ID="$PREVIEW_ID" PREVIEW_STACK_SCOPE=go pnpm --filter @token-query/infra-cdk cdk destroy "$STACK_NAME" --force
          echo "go_cleanup_status=deleted" >> "$GITHUB_OUTPUT"

      - name: Comment cleanup result
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          GO_CLEANUP_STATUS: ${{ steps.go_cleanup.outputs.go_cleanup_status || steps.go_cleanup.outcome }}
        with:
          script: |
            const marker = "<!-- token-query-go-preview-cleanup -->";
            const merged = context.payload.pull_request?.merged === true;
            const body = `${marker}
            Go preview cleanup finished.

            Stack: \`${process.env.STACK_NAME}\` (${process.env.GO_CLEANUP_STATUS})
            ECS service: \`${process.env.SERVICE_NAME}\`
            Cloud Map origin: \`${process.env.GO_SERVICE_ORIGIN}\`
            Preview ID: \`${process.env.PREVIEW_ID}\`
            PR result: ${merged ? "merged" : "closed"}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Unable to comment cleanup result: ${error.message}`);
            }

      - name: Write manual cleanup summary
        if: always() && github.event_name == 'workflow_dispatch'
        env:
          GO_CLEANUP_STATUS: ${{ steps.go_cleanup.outputs.go_cleanup_status || steps.go_cleanup.outcome }}
        run: |
          {
            echo "## Go preview cleanup"
            echo
            echo "Preview ID: \`$PREVIEW_ID\`"
            echo "Stack: \`$STACK_NAME\` ($GO_CLEANUP_STATUS)"
            echo "ECS service: \`$SERVICE_NAME\`"
            echo "Cloud Map origin: \`$GO_SERVICE_ORIGIN\`"
          } >> "$GITHUB_STEP_SUMMARY"
