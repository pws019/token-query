name: Cleanup Worker Preview

on:
  pull_request:
    types:
      - closed
    branches:
      - main-v2
    paths:
      - "apps/web/**"
      - "packages/env/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/deploy-worker-preview.yml"
      - ".github/workflows/cleanup-worker-preview.yml"
      - "docs/pr-preview-naming.md"
  workflow_dispatch:
    inputs:
      preview_id:
        description: "Preview ID to clean up, for example feat-001."
        required: true
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: worker-preview-cleanup-${{ github.event.pull_request.number || inputs.preview_id }}
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      PREVIEW_BASE_DOMAIN: ${{ vars.PREVIEW_BASE_DOMAIN || 'app.doyouadoreme.online' }}

    steps:
      - name: Resolve preview names
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_NAME: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          INPUT_PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail

          preview_id_regex='^(bug|feat|fix|chore|hotfix)-[0-9]+$'
          branch_regex='^(bug|feat|fix|chore|hotfix)/((bug|feat|fix|chore|hotfix)-[0-9]+)-[a-z0-9-]+$'
          title_regex='^((bug|feat|fix|chore|hotfix)-[0-9]+):'

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            preview_id="$INPUT_PREVIEW_ID"

            if [[ ! "$preview_id" =~ $preview_id_regex ]]; then
              echo "::error::preview_id must match <type>-<number>, for example feat-001."
              exit 1
            fi
          elif [[ "$BRANCH_NAME" =~ $branch_regex ]]; then
            preview_id="${BASH_REMATCH[2]}"
          elif [[ "$PR_TITLE" =~ $title_regex ]]; then
            preview_id="${BASH_REMATCH[1]}"
          else
            echo "::error::Unable to resolve preview ID from branch '$BRANCH_NAME' or PR title '$PR_TITLE'."
            exit 1
          fi

          {
            echo "PREVIEW_ID=$preview_id"
            echo "WORKER_NAME=token-query-pr-$preview_id"
            echo "PREVIEW_DOMAIN=$preview_id.$PREVIEW_BASE_DOMAIN"
          } >> "$GITHUB_ENV"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Check Worker preview cleanup settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$PREVIEW_ID"
          test -n "$WORKER_NAME"
          test -n "$PREVIEW_DOMAIN"

      - name: Delete preview Worker
        id: worker_cleanup
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          printf "yes\n" | pnpm dlx wrangler@4 delete --name "$WORKER_NAME"

      - name: Comment cleanup result
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          WORKER_CLEANUP_STATUS: ${{ steps.worker_cleanup.outcome }}
        with:
          script: |
            const marker = "<!-- token-query-worker-preview-cleanup -->";
            const merged = context.payload.pull_request?.merged === true;
            const body = `${marker}
            Worker preview cleanup finished.

            Preview URL: https://${process.env.PREVIEW_DOMAIN}
            Worker: \`${process.env.WORKER_NAME}\` (${process.env.WORKER_CLEANUP_STATUS})
            Preview ID: \`${process.env.PREVIEW_ID}\`
            PR result: ${merged ? "merged" : "closed"}`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });
              const existing = comments.find((comment) => comment.body?.includes(marker));

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              core.warning(`Unable to comment cleanup result: ${error.message}`);
            }

      - name: Write manual cleanup summary
        if: always() && github.event_name == 'workflow_dispatch'
        env:
          WORKER_CLEANUP_STATUS: ${{ steps.worker_cleanup.outcome }}
        run: |
          {
            echo "## Worker preview cleanup"
            echo
            echo "Preview URL: https://$PREVIEW_DOMAIN"
            echo "Preview ID: \`$PREVIEW_ID\`"
            echo "Worker: \`$WORKER_NAME\` ($WORKER_CLEANUP_STATUS)"
          } >> "$GITHUB_STEP_SUMMARY"
