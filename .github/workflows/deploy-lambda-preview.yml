name: Deploy Lambda Preview

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    branches:
      - main-v2
    paths:
      - "apps/server/**"
      - "packages/api/**"
      - "packages/db/**"
      - "packages/env/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "infra/cdk/**"
      - ".github/workflows/deploy-lambda-preview.yml"
      - "docs/pr-preview-naming.md"
  workflow_dispatch:
    inputs:
      preview_id:
        description: "Preview ID to deploy, for example feat-001."
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: lambda-preview-${{ github.event.pull_request.number || inputs.preview_id }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      PREVIEW_BASE_DOMAIN: ${{ vars.PREVIEW_BASE_DOMAIN || 'app.doyouadoreme.online' }}

    steps:
      - name: Resolve preview names
        id: preview
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_NAME: ${{ github.head_ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          INPUT_PREVIEW_ID: ${{ inputs.preview_id }}
        run: |
          set -euo pipefail

          preview_id_regex='^(bug|feat|fix|chore|hotfix)-[0-9]+$'
          branch_regex='^(bug|feat|fix|chore|hotfix)/((bug|feat|fix|chore|hotfix)-[0-9]+)-[a-z0-9-]+$'
          title_regex='^((bug|feat|fix|chore|hotfix)-[0-9]+):'

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            preview_id="$INPUT_PREVIEW_ID"

            if [[ ! "$preview_id" =~ $preview_id_regex ]]; then
              echo "::error::preview_id must match <type>-<number>, for example feat-001."
              exit 1
            fi
          else
            if [[ ! "$BRANCH_NAME" =~ $branch_regex ]]; then
              echo "::error::Branch name must match <type>/<preview-id>-<short-description>, for example bug/bug-111-login-token-expiry."
              exit 1
            fi

            branch_preview_id="${BASH_REMATCH[2]}"

            if [[ ! "$PR_TITLE" =~ $title_regex ]]; then
              echo "::error::PR title must start with <preview-id>:, for example bug-111: õ┐«ÕżŹńÖ╗ÕĮĢ token Ķ┐ćµ£¤ķŚ«ķóś."
              exit 1
            fi

            title_preview_id="${BASH_REMATCH[1]}"

            if [[ "$branch_preview_id" != "$title_preview_id" ]]; then
              echo "::error::Preview ID mismatch. Branch uses '$branch_preview_id' but PR title uses '$title_preview_id'."
              exit 1
            fi

            preview_id="$branch_preview_id"
          fi

          if (( ${#preview_id} > 40 )); then
            echo "::error::Preview ID is too long. Keep it at 40 characters or fewer."
            exit 1
          fi

          stack_name="token-query-preview-api-$preview_id"
          function_name="token-query-pr-$preview_id"
          preview_domain="$preview_id.$PREVIEW_BASE_DOMAIN"
          short_sha="${COMMIT_SHA:0:7}"

          {
            echo "preview_id=$preview_id"
            echo "stack_name=$stack_name"
            echo "function_name=$function_name"
            echo "preview_domain=$preview_domain"
            echo "short_sha=$short_sha"
          } >> "$GITHUB_OUTPUT"

          {
            echo "PREVIEW_ID=$preview_id"
            echo "STACK_NAME=$stack_name"
            echo "FUNCTION_NAME=$function_name"
            echo "PREVIEW_DOMAIN=$preview_domain"
            echo "SHORT_SHA=$short_sha"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check deployment settings
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          INTERNAL_PROXY_TOKEN: ${{ secrets.INTERNAL_PROXY_TOKEN }}
        run: |
          set -euo pipefail

          test -n "$AWS_REGION"
          test -n "$AWS_DEPLOY_ROLE_ARN"
          test -n "$INTERNAL_PROXY_TOKEN"
          test -n "$PREVIEW_ID"
          test -n "$STACK_NAME"
          test -n "$FUNCTION_NAME"
          test -n "$PREVIEW_DOMAIN"

      - name: Check server types
        run: pnpm --filter server check-types

      - name: Check CDK types
        run: pnpm --filter @token-query/infra-cdk check-types

      - name: Build server
        run: pnpm --filter server build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Lambda preview stack
        env:
          INTERNAL_PROXY_TOKEN: ${{ secrets.INTERNAL_PROXY_TOKEN }}
          ADMIN_MIGRATION_TOKEN: ${{ secrets.ADMIN_MIGRATION_TOKEN }}
        run: |
          set -euo pipefail

          parameters=(
            "--parameters" "$STACK_NAME:CorsOrigin=https://$PREVIEW_DOMAIN"
            "--parameters" "$STACK_NAME:InternalProxyToken=$INTERNAL_PROXY_TOKEN"
          )

          if [ -n "${ADMIN_MIGRATION_TOKEN:-}" ]; then
            parameters+=("--parameters" "$STACK_NAME:AdminMigrationToken=$ADMIN_MIGRATION_TOKEN")
          fi

          CDK_STACK_SCOPE=api PREVIEW_ID="$PREVIEW_ID" PREVIEW_STACK_SCOPE=api pnpm --filter @token-query/infra-cdk cdk deploy "$STACK_NAME" \
            --require-approval never \
            "${parameters[@]}"

      - name: Comment Lambda preview result
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          STACK_NAME: ${{ env.STACK_NAME }}
          FUNCTION_NAME: ${{ env.FUNCTION_NAME }}
          PREVIEW_ID: ${{ env.PREVIEW_ID }}
          PREVIEW_DOMAIN: ${{ env.PREVIEW_DOMAIN }}
          SHORT_SHA: ${{ env.SHORT_SHA }}
        with:
          script: |
            const marker = "<!-- token-query-lambda-preview -->";
            const body = `${marker}
            Lambda preview is ready.

            Preview ID: \`${process.env.PREVIEW_ID}\`
            Stack: \`${process.env.STACK_NAME}\`
            Function: \`${process.env.FUNCTION_NAME}\`
            Commit: \`${process.env.SHORT_SHA}\`

            A Worker deployed with the same Preview ID will send \`X-Preview-Id: ${process.env.PREVIEW_ID}\`, so the production Lambda router can invoke this preview Lambda.`;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Write manual preview summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          {
            echo "## Lambda preview"
            echo
            echo "Preview ID: \`$PREVIEW_ID\`"
            echo "Stack: \`$STACK_NAME\`"
            echo "Function: \`$FUNCTION_NAME\`"
            echo "Preview domain: https://$PREVIEW_DOMAIN"
            echo "Commit: \`$SHORT_SHA\`"
            echo
            echo "A Worker deployed with the same Preview ID will send \`X-Preview-Id: $PREVIEW_ID\`, so the production Lambda router can invoke this preview Lambda."
          } >> "$GITHUB_STEP_SUMMARY"
