name: Deploy AWS Lambda API

on:
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - "infra/template.yaml"
      - "infra/samconfig.toml"
      - ".github/workflows/deploy-lambda-api.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-west-2' }}
      SAM_STACK_NAME: ${{ vars.SAM_STACK_NAME || 'token-query-api' }}
      CORS_ORIGIN: ${{ vars.CORS_ORIGIN || 'https://app.doyouadoreme.online' }}
      PRIVATE_SUBNET_IDS_SSM_PARAM: ${{ vars.PRIVATE_SUBNET_IDS_SSM_PARAM || '/token-query/network/private-subnet-ids' }}
      LAMBDA_SECURITY_GROUP_ID_SSM_PARAM: ${{ vars.LAMBDA_SECURITY_GROUP_ID_SSM_PARAM || '/token-query/network/lambda-security-group-id' }}
      LAMBDA_EXECUTION_ROLE_ARN: ${{ vars.LAMBDA_EXECUTION_ROLE_ARN || 'arn:aws:iam::707605822527:role/service-role/token-query-function-role-qsx6aji9' }}
      CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN || 'arn:aws:acm:us-west-2:707605822527:certificate/6dd559f1-2c41-43ab-823a-ba094199fcb1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Setup AWS SAM
        uses: aws-actions/setup-sam@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check SAM deployment settings
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          INTERNAL_PROXY_TOKEN: ${{ secrets.INTERNAL_PROXY_TOKEN }}
        run: |
          test -n "$AWS_REGION"
          test -n "$SAM_STACK_NAME"
          test -n "$AWS_DEPLOY_ROLE_ARN"
          test -n "$DB_PASSWORD"
          test -n "$INTERNAL_PROXY_TOKEN"
          test -n "$CORS_ORIGIN"
          test -n "$PRIVATE_SUBNET_IDS_SSM_PARAM"
          test -n "$LAMBDA_SECURITY_GROUP_ID_SSM_PARAM"
          test -n "$LAMBDA_EXECUTION_ROLE_ARN"
          test -n "$CERTIFICATE_ARN"

      - name: Check server types
        run: pnpm --filter server check-types

      - name: Build server
        run: pnpm --filter server build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate SAM template
        run: sam validate --template-file infra/template.yaml --region "$AWS_REGION"

      - name: Build SAM application
        run: sam build --template-file infra/template.yaml --cached --parallel

      - name: Deploy SAM stack
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          INTERNAL_PROXY_TOKEN: ${{ secrets.INTERNAL_PROXY_TOKEN }}
          ADMIN_MIGRATION_TOKEN: ${{ secrets.ADMIN_MIGRATION_TOKEN }}
        run: |
          PARAMETER_OVERRIDES=(
            "CorsOrigin=$CORS_ORIGIN"
            "DbPassword=$DB_PASSWORD"
            "InternalProxyToken=$INTERNAL_PROXY_TOKEN"
            "PrivateSubnetIds=$PRIVATE_SUBNET_IDS_SSM_PARAM"
            "LambdaSecurityGroupId=$LAMBDA_SECURITY_GROUP_ID_SSM_PARAM"
            "LambdaExecutionRoleArn=$LAMBDA_EXECUTION_ROLE_ARN"
            "CertificateArn=$CERTIFICATE_ARN"
          )

          if [ -n "$ADMIN_MIGRATION_TOKEN" ]; then
            PARAMETER_OVERRIDES+=("AdminMigrationToken=$ADMIN_MIGRATION_TOKEN")
          fi

          sam deploy \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --resolve-s3 \
            --s3-prefix "$SAM_STACK_NAME" \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAMETER_OVERRIDES[@]}"

      - name: Show SAM outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "$SAM_STACK_NAME" \
            --region "$AWS_REGION" \
            --query 'Stacks[0].Outputs' \
            --output table
