name: Deploy App

on:
  push:
    branches:
      - main
      - main-v2
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm --filter web build

      - name: Generate Wrangler config
        env:
          LAMBDA_API_ORIGIN: ${{ vars.LAMBDA_API_ORIGIN }}
        run: |
          cat > apps/web/wrangler.generated.jsonc <<EOF
          {
            "$schema": "../../node_modules/wrangler/config-schema.json",
            "name": "token-query",
            "main": "./worker.ts",
            "compatibility_date": "2026-07-01",
            "observability": {
              "enabled": true
            },
            "vars": {
              "LAMBDA_API_ORIGIN": "$LAMBDA_API_ORIGIN"
            },
            "assets": {
              "directory": "./build/client",
              "binding": "ASSETS"
            }
          }
          EOF

      - name: Check Cloudflare deployment settings
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_WORKER_DOMAIN: ${{ vars.CLOUDFLARE_WORKER_DOMAIN }}
          LAMBDA_API_ORIGIN: ${{ vars.LAMBDA_API_ORIGIN }}
          INTERNAL_PROXY_TOKEN: ${{ secrets.INTERNAL_PROXY_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"
          test -n "$CLOUDFLARE_WORKER_DOMAIN"
          test -n "$LAMBDA_API_ORIGIN"
          test -n "$INTERNAL_PROXY_TOKEN"

      - name: Deploy app Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >
          pnpm dlx wrangler@4 deploy
          --config=apps/web/wrangler.generated.jsonc
          --domain="${{ vars.CLOUDFLARE_WORKER_DOMAIN }}"
          --keep-vars

      - name: Set app Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_PROXY_TOKEN: ${{ secrets.INTERNAL_PROXY_TOKEN }}
        run: |
          printf "%s" "$INTERNAL_PROXY_TOKEN" | pnpm dlx wrangler@4 secret put INTERNAL_PROXY_TOKEN --config=apps/web/wrangler.generated.jsonc
