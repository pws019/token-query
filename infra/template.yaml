AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Token Query Lambda API. Phase 1 manages the API Lambda and HTTP API while referencing existing VPC and Aurora resources.

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 20
    MemorySize: 128
    Tracing: PassThrough
    Environment:
      Variables:
        NODE_ENV: production

Parameters:
  CorsOrigin:
    Type: String
    Default: https://app.doyouadoreme.online

  DatabaseUrl:
    Type: String
    NoEcho: true

  InternalProxyToken:
    Type: String
    NoEcho: true

  AdminMigrationToken:
    Type: String
    NoEcho: true
    Default: ""

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Existing private subnet IDs used by the Lambda function.

  LambdaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Existing Lambda security group allowed to reach Aurora PostgreSQL.

  LambdaExecutionRoleArn:
    Type: String
    Description: Existing IAM role assumed by the Lambda function (created outside this stack; not imported).

Resources:
  TokenQueryHttpApi:
    Type: AWS::Serverless::HttpApi
    DeletionPolicy: Retain
    Properties:
      Name: token-query-http-api
      StageName: "$default"
      FailOnWarnings: true

  TokenQueryFunction:
    Type: AWS::Serverless::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: token-query-function
      Description: Token Query API running on AWS Lambda.
      CodeUri: apps/server/dist/
      Handler: lambda.handler
      Role: !Ref LambdaExecutionRoleArn
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref TokenQueryFunctionLogGroup
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Ref PrivateSubnetIds
      Environment:
        Variables:
          CORS_ORIGIN: !Ref CorsOrigin
          DATABASE_URL: !Ref DatabaseUrl
          INTERNAL_PROXY_TOKEN: !Ref InternalProxyToken
          ADMIN_MIGRATION_TOKEN: !Ref AdminMigrationToken
      Events:
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref TokenQueryHttpApi
            Method: ANY
            Path: /{proxy+}

  TokenQueryFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Retain
    Properties:
      LogGroupName: /aws/lambda/token-query-function
      RetentionInDays: 14

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint for the Lambda API.
    Value: !Sub "https://${TokenQueryHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"

  FunctionName:
    Description: Lambda function managed by this SAM stack.
    Value: !Ref TokenQueryFunction

  FunctionArn:
    Description: Lambda function ARN managed by this SAM stack.
    Value: !GetAtt TokenQueryFunction.Arn
