AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Token Query Lambda API. Phase 1 manages the API Lambda and HTTP API while referencing existing VPC and Aurora resources.

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - arm64
    Timeout: 20
    MemorySize: 128
    Tracing: PassThrough
    Environment:
      Variables:
        NODE_ENV: production

Parameters:
  CorsOrigin:
    Type: String
    Default: https://app.doyouadoreme.online

  DbClusterEndpoint:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /token-query/db/cluster-endpoint
    Description: Aurora cluster endpoint, resolved live from the token-query-db stack's SSM parameter on every deploy.

  DbPassword:
    Type: String
    NoEcho: true
    Description: Aurora master password. Must match the DbMasterPassword used to deploy the token-query-db stack.

  InternalProxyToken:
    Type: String
    NoEcho: true

  AdminMigrationToken:
    Type: String
    NoEcho: true
    Default: ""

  PrivateSubnetIds:
    Type: AWS::SSM::Parameter::Value<List<AWS::EC2::Subnet::Id>>
    Default: /token-query/network/private-subnet-ids
    Description: Private subnet IDs, resolved live from the token-query-network stack's SSM parameter on every deploy.

  LambdaSecurityGroupId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::SecurityGroup::Id>
    Default: /token-query/network/lambda-security-group-id
    Description: Lambda security group, resolved live from the token-query-network stack's SSM parameter on every deploy.

  LambdaExecutionRoleArn:
    Type: String
    Description: Existing IAM role assumed by the Lambda function (created outside this stack; not imported).

  CertificateArn:
    Type: String
    Description: Existing ACM certificate ARN for the custom domain (ACM certs cannot be imported into CloudFormation; referenced by ARN only).

Resources:
  TokenQueryHttpApi:
    Type: AWS::Serverless::HttpApi
    DeletionPolicy: Delete
    Properties:
      Name: token-query-http-api
      StageName: "$default"
      FailOnWarnings: true

  TokenQueryFunction:
    Type: AWS::Serverless::Function
    DeletionPolicy: Delete
    Properties:
      FunctionName: token-query-function
      Description: Token Query API running on AWS Lambda.
      CodeUri: ../apps/server/dist/
      Handler: lambda.handler
      Role: !Ref LambdaExecutionRoleArn
      LoggingConfig:
        LogFormat: Text
        LogGroup: !Ref TokenQueryFunctionLogGroup
      VpcConfig:
        SecurityGroupIds:
          - !Ref LambdaSecurityGroupId
        SubnetIds: !Ref PrivateSubnetIds
      Environment:
        Variables:
          CORS_ORIGIN: !Ref CorsOrigin
          DATABASE_URL: !Sub "postgresql://postgres:${DbPassword}@${DbClusterEndpoint}:5432/postgres?sslmode=require&uselibpqcompat=true"
          INTERNAL_PROXY_TOKEN: !Ref InternalProxyToken
          ADMIN_MIGRATION_TOKEN: !Ref AdminMigrationToken
      Events:
        ProxyApi:
          Type: HttpApi
          Properties:
            ApiId: !Ref TokenQueryHttpApi
            Method: ANY
            Path: /{proxy+}

  TokenQueryFunctionLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: Delete
    Properties:
      LogGroupName: /aws/lambda/token-query-function
      RetentionInDays: 14

  ApiDomainName:
    Type: AWS::ApiGatewayV2::DomainName
    DeletionPolicy: Delete
    Properties:
      DomainName: api.doyouadoreme.online
      DomainNameConfigurations:
        - CertificateArn: !Ref CertificateArn
          EndpointType: REGIONAL

  ApiMapping:
    Type: AWS::ApiGatewayV2::ApiMapping
    DeletionPolicy: Delete
    DependsOn: TokenQueryHttpApiApiGatewayDefaultStage
    Properties:
      ApiId: !Ref TokenQueryHttpApi
      DomainName: !Ref ApiDomainName
      Stage: "$default"

Outputs:
  ApiEndpoint:
    Description: HTTP API endpoint for the Lambda API.
    Value: !Sub "https://${TokenQueryHttpApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}"

  FunctionName:
    Description: Lambda function managed by this SAM stack.
    Value: !Ref TokenQueryFunction

  FunctionArn:
    Description: Lambda function ARN managed by this SAM stack.
    Value: !GetAtt TokenQueryFunction.Arn

  CustomDomainUrl:
    Description: Custom domain endpoint for the Lambda API.
    Value: !Sub "https://${ApiDomainName}"
